apiVersion: batch/v1
kind: Job
metadata:
  name: dbt-core-seed
spec:
  template:
    spec:
      containers:
        - name: dbt
          image: benchmark:0.0.1
          resources:
            # Equivalent to A10 instance
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      restartPolicy: Never
  backoffLimit: 0
