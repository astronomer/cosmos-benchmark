apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-test-cosmos-sync
spec:
  template:
    spec:
      containers:
        - name: airflow
          image: cosmos-benchmark:0.0.3
          imagePullPolicy: Never
          command: ["airflow", "dags", "test", "cosmos_bq_sync"]
          env:
            - name: AIRFLOW_CONN_GCP_GS_CONN
              valueFrom:
                secretKeyRef:
                  name: gcp-credentials
                  key: airflow-conn
          resources:
            # Equivalent to Astro's A10 instance
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      restartPolicy: Never
  backoffLimit: 0
