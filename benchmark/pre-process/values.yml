executor: CeleryExecutor

images:
  airflow:
    repository: benchmark
    tag: 0.0.7

config:
  core:
    dags_are_paused_at_creation: "False"
    parallelism: "16"
  celery:
    worker_concurrency: "2"

postgresql:
  image:
    repository: postgres
    # Pin to a stable Postgres major. Apache Airflow Helm chart 1.21 supports
    # Postgres 13/14/15/16; using 15 here matches the chart's recommended tier.
    tag: "15"

scheduler:
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

workers:
  replicas: 4
  # Disable the chart's StatefulSet/PVC mode — workers are stateless Celery
  # workers that don't need persistent storage. This lets setup.sh's rollout
  # status check target deployment/airflow-worker (instead of a StatefulSet).
  persistence:
    enabled: false
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
