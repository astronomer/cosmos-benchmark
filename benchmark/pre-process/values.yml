executor: CeleryExecutor

images:
  airflow:
    repository: benchmark
    tag: 0.0.6

config:
  core:
    dags_are_paused_at_creation: "False"
    parallelism: "16"
  celery:
    worker_concurrency: "4"
  cosmos:
    watcher_dbt_execution_queue: "producer"

postgresql:
  image:
    repository: postgres
    # Pin to a stable Postgres major. Apache Airflow Helm chart 1.21 supports
    # Postgres 13/14/15/16; using 15 here matches the chart's recommended tier.
    tag: "15"

scheduler:
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

# Default workers act as the WATCHER consumer pool (sensors on the `default` queue).
# Producer workers are deployed separately by pre-process/render-producer-worker.py
# (driven from setup.sh) so we can give them dedicated resources and scrape them as a
# distinct Prometheus group.
# We use a Deployment (persistence disabled) so consumer pods get hash-suffixed
# names matching `airflow-worker-.+`, distinct from `airflow-producer-worker-.+`.
workers:
  replicas: 2
  persistence:
    enabled: false
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
