executor: CeleryExecutor

images:
  airflow:
    repository: benchmark
    tag: 0.0.7

config:
  core:
    dags_are_paused_at_creation: "False"
    parallelism: "16"
  celery:
    worker_concurrency: "2"
  cosmos:
    watcher_dbt_execution_queue: "producer"

postgresql:
  image:
    repository: postgres
    # Pin to a stable Postgres major. Apache Airflow Helm chart 1.21 supports
    # Postgres 13/14/15/16; using 15 here matches the chart's recommended tier.
    tag: "15"

scheduler:
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

workers:
  replicas: 4
  # Disable the chart's StatefulSet/PVC mode — workers are stateless Celery
  # workers that don't need persistent storage. This lets setup.sh's rollout
  # status check target deployment/airflow-worker (instead of a StatefulSet).
  persistence:
    enabled: false
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
  # The synthetic_large_dbt_project Postgres profile (profiles.yml)
  # reads these env vars. Point them at the chart's bundled Postgres and write
  # dbt views into a dedicated `synthetic` schema so they never touch Airflow's
  # own metadata tables in `public`. The producer pool inherits this env because
  # render-producer-worker.py clones the worker Deployment's pod spec.
  env:
    - name: POSTGRES_HOST
      value: airflow-postgresql
    - name: POSTGRES_USER
      value: postgres
    - name: POSTGRES_DB
      value: postgres
    - name: POSTGRES_SCHEMA
      value: synthetic
    - name: POSTGRES_PORT
      value: "5432"
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: airflow-postgresql
          key: postgres-password
