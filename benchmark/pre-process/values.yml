executor: CeleryExecutor

images:
  airflow:
    repository: benchmark
    tag: 0.0.6

# BQ_DATASET is required by the dbt profile (pre-process/profiles.yml) and is
# injected into every Airflow pod (scheduler, workers, api-server, dag-processor)
# via the chart's top-level env: block. setup.sh overrides the value at install
# time with `--set-string env[0].value=$BQ_DATASET` after verifying the env var
# is set; the placeholder below only matters if someone bypasses setup.sh.
env:
  - name: BQ_DATASET
    value: "UNSET"

config:
  core:
    dags_are_paused_at_creation: "False"
    parallelism: "16"
  celery:
    worker_concurrency: "4"
  cosmos:
    watcher_dbt_execution_queue: "producer"

postgresql:
  image:
    repository: postgres
    # Pin to a stable Postgres major. Apache Airflow Helm chart 1.21 supports
    # Postgres 13/14/15/16; using 15 here matches the chart's recommended tier.
    tag: "15"

scheduler:
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

# Default workers act as the WATCHER consumer pool (sensors on the `default` queue).
# Producer workers are deployed separately by pre-process/render-producer-worker.py
# (driven from setup.sh) so we can give them dedicated resources and scrape them as a
# distinct Prometheus group.
# We use a Deployment (persistence disabled) so consumer pods get hash-suffixed
# names matching `airflow-worker-.+`, distinct from `airflow-producer-worker-.+`.
workers:
  replicas: 2
  persistence:
    enabled: false
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

# Shared PVC for task logs so the api-server / UI can read them off disk instead
# of fetching from each worker over port 8793. On a kind cluster, pod hostnames
# (e.g. airflow-worker-<hash>) are not resolvable via cluster DNS, so the
# served-logs path fails with "Name or service not known" and the UI shows only
# the fetch error. Mounting a shared PVC sidesteps the DNS lookup entirely.
#
# We point at a pre-created PVC (pre-process/airflow-logs-pvc.yaml, applied by
# setup.sh) because the chart hard-codes ReadWriteMany on its templated PVC and
# rejects `accessMode` overrides via values.schema.json — but kind's local-path
# provisioner only supports ReadWriteOnce.
logs:
  persistence:
    enabled: true
    existingClaim: airflow-logs
