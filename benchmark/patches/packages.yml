# Benchmark overlay: extends upstream fhir-dbt-analytics/packages.yml with
# additional dbt packages so that `dbt deps` does meaningful work. Used to
# measure the impact of caching `dbt_packages/` between builds/pods.
#
# Upstream pins (dbt_utils <1.2.0, dbt_date <0.8.0, dbt_expectations <0.9.0)
# are preserved so the rest of the project keeps compiling.
packages:
  # Upstream packages (kept as-is from dbt/fhir-dbt-analytics/packages.yml).
  - package: dbt-labs/dbt_utils
    version: [">=1.0.0", "<1.2.0"]
  - package: calogica/dbt_date
    version: [">=0.7.2", "<0.8.0"]
  - package: calogica/dbt_expectations
    version: [">=0.8.5", "<0.9.0"]
  - package: google/fhir_dbt_utils
    version: 1.0.8

  # Benchmark-only additions to make `dbt deps` heavier.
  - package: dbt-labs/audit_helper
    version: [">=0.9.0", "<0.13.0"]
  - package: dbt-labs/codegen
    version: [">=0.12.0", "<0.14.0"]
  - package: dbt-labs/dbt_external_tables
    version: [">=0.9.0", "<0.11.0"]
  - package: dbt-labs/dbt_project_evaluator
    version: [">=0.7.0", "<0.9.0"]
