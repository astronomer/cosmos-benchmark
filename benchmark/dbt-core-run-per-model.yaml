apiVersion: batch/v1
kind: Job
metadata:
  name: dbt-core-run-per-model
spec:
  template:
    spec:
      containers:
        - name: dbt
          image: fhir-dbt-analytics:0.9.0
          command: ["./run-dbt-core-per-model.sh"]
          resources:
            # Equivalent to A10 instance
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      restartPolicy: Never
  backoffLimit: 0
